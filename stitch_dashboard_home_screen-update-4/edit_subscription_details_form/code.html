<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Subscription Details Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4f46e5",
              "background-light": "#f8f8fc",
              "background-dark": "#101022",
              "foreground-light": "#ffffff",
              "foreground-dark": "#1e293b",
              "border-light": "#e2e8f0",
              "border-dark": "#334155",
              "text-light-primary": "#0d0d1b",
              "text-dark-primary": "#f8fafc",
              "text-light-secondary": "#4c4c9a",
              "text-dark-secondary": "#94a3b8",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark antialiased font-display">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-hidden" style="--select-button-svg: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(100, 116, 139)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z%27%3e%3c/path%3e%3c/svg%3e');">
<!-- Main page content (dimmed) -->
<div class="w-full h-full p-8 text-text-light-primary dark:text-text-dark-primary">
<h1 class="text-3xl font-bold">Customer Subscriptions</h1>
<p class="text-text-light-secondary dark:text-text-dark-secondary mt-2">This is the main content area, which is now in the background.</p>
</div>
<!-- Backdrop -->
<div class="fixed inset-0 bg-black/30 z-40"></div>
<!-- Slide-over Panel -->
<div class="fixed inset-y-0 right-0 z-50 flex w-full max-w-lg">
<div class="flex flex-col w-full bg-foreground-light dark:bg-foreground-dark border-l border-border-light dark:border-border-dark shadow-2xl">
<!-- Panel Header -->
<div class="flex items-start justify-between p-6 border-b border-border-light dark:border-border-dark">
<div class="flex flex-col gap-1">
<h2 class="text-2xl font-bold text-text-light-primary dark:text-text-dark-primary tracking-tight">Edit Subscription</h2>
<p class="text-sm font-normal text-text-light-secondary dark:text-text-dark-secondary">sub_123abC</p>
</div>
<button class="p-2 text-text-light-secondary dark:text-text-dark-secondary hover:text-text-light-primary dark:hover:text-text-dark-primary">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Body -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- Plan Section -->
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<p class="text-sm font-medium text-text-light-primary dark:text-text-dark-primary pb-2">Plan</p>
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark focus:border-primary dark:focus:border-primary h-12 bg-[image:--select-button-svg] placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 py-2 text-base font-normal leading-normal">
<option selected="" value="pro">Pro Plan</option>
<option value="basic">Basic Plan</option>
<option value="enterprise">Enterprise Plan</option>
</select>
</label>
</div>
<!-- Billing Cycle Section -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<label class="flex flex-col w-full">
<p class="text-sm font-medium text-text-light-primary dark:text-text-dark-primary pb-2">Start Date</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark focus:border-primary dark:focus:border-primary h-12 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 py-2 text-base font-normal leading-normal" type="date" value="2023-01-01"/>
</label>
<label class="flex flex-col w-full">
<p class="text-sm font-medium text-text-light-primary dark:text-text-dark-primary pb-2">End Date</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark focus:border-primary dark:focus:border-primary h-12 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 py-2 text-base font-normal leading-normal" type="date" value=""/>
</label>
</div>
<!-- Billing Behavior Section -->
<div class="flex items-center justify-between gap-4 bg-background-light dark:bg-background-dark p-4 rounded-lg border border-border-light dark:border-border-dark">
<div class="flex items-center gap-4">
<div class="text-text-light-primary dark:text-text-dark-primary flex items-center justify-center rounded-lg bg-background-light dark:bg-foreground-dark shrink-0 size-10 border border-border-light dark:border-border-dark">
<span class="material-symbols-outlined text-xl">receipt_long</span>
</div>
<p class="text-base font-medium text-text-light-primary dark:text-text-dark-primary">Prorate changes</p>
</div>
<div class="shrink-0">
<label class="relative flex h-[26px] w-[44px] cursor-pointer items-center rounded-full bg-gray-200 dark:bg-gray-700 p-0.5 has-[:checked]:bg-primary">
<input checked="" class="invisible absolute" type="checkbox"/>
<div class="h-5 w-5 rounded-full bg-white transition-transform duration-200 ease-in-out" style="transform: translateX(18px);"></div>
</label>
</div>
</div>
<!-- Status Section -->
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<p class="text-sm font-medium text-text-light-primary dark:text-text-dark-primary pb-2">Status</p>
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark focus:border-primary dark:focus:border-primary h-12 bg-[image:--select-button-svg] placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 py-2 text-base font-normal leading-normal">
<option selected="" value="active">Active</option>
<option value="trialing">Trialing</option>
<option value="paused">Paused</option>
<option value="canceled">Canceled</option>
</select>
</label>
</div>
</div>
<!-- Panel Footer -->
<div class="flex justify-end gap-4 p-6 border-t border-border-light dark:border-border-dark">
<button class="px-4 py-2.5 rounded-lg text-sm font-semibold text-text-light-primary dark:text-text-dark-primary bg-foreground-light dark:bg-foreground-dark border border-border-light dark:border-border-dark hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
<button class="px-4 py-2.5 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-primary/90">Save Changes</button>
</div>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Coupon Detail View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366F1", // Indigo
                        "background-light": "#f6f6f8", // Not used in dark-only panel
                        "background-dark": "#111827", // Dark Slate/Gray
                        "panel-dark": "#1F2937",
                        "text-light": "#F9FAFB",
                        "text-medium": "#D1D5DB",
                        "text-dark": "#9CA3AF",
                        "border-dark": "#374151",
                        "success": "#10B981" // Green
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-background-dark font-display">
<div aria-hidden="true" class="fixed inset-0 bg-black/60"></div>
<div class="relative flex min-h-screen w-full justify-end overflow-x-hidden">
<div class="flex h-screen w-full max-w-2xl flex-col bg-panel-dark text-text-light">
<!-- Panel Header -->
<header class="flex shrink-0 items-center justify-between border-b border-border-dark px-6 py-4">
<p class="font-display text-lg font-semibold leading-tight text-text-light">Coupon Details</p>
<button class="flex h-8 w-8 items-center justify-center rounded-lg text-text-dark transition-colors hover:bg-white/10 hover:text-text-light">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Panel Content -->
<main class="flex-1 overflow-y-auto p-6">
<!-- Coupon Code and Status -->
<div class="flex flex-col gap-4">
<div class="flex flex-wrap items-center justify-between gap-4">
<p class="font-display text-2xl font-bold tracking-tight text-text-light">SAVE25</p>
<div class="flex h-7 shrink-0 items-center justify-center gap-x-2 rounded-full bg-success/10 px-3 py-1">
<div class="h-2 w-2 rounded-full bg-success"></div>
<p class="font-display text-sm font-medium leading-normal text-success">Active</p>
</div>
</div>
</div>
<!-- Redemption Progress Bar -->
<div class="flex flex-col gap-3 py-6">
<div class="flex items-center justify-between gap-6">
<p class="font-display text-base font-medium leading-normal text-text-light">Redemptions</p>
<p class="font-display text-sm font-normal leading-normal text-text-medium">57%</p>
</div>
<div class="h-2 w-full rounded-full bg-border-dark">
<div class="h-2 rounded-full bg-primary" style="width: 57%;"></div>
</div>
<p class="font-display text-sm font-normal leading-normal text-text-dark">57 of 100 used</p>
</div>
<!-- Description List -->
<div class="grid grid-cols-1 gap-x-4 border-t border-border-dark sm:grid-cols-2">
<div class="flex flex-col gap-1 py-4">
<div class="flex items-center gap-1.5">
<p class="font-display text-sm font-normal leading-normal text-text-dark">Discount</p>
</div>
<p class="font-display text-sm font-normal leading-normal text-text-medium">25% off</p>
</div>
<div class="flex flex-col gap-1 border-t border-border-dark py-4 sm:border-t-0">
<div class="flex items-center gap-1.5">
<p class="font-display text-sm font-normal leading-normal text-text-dark">Duration</p>
<span class="material-symbols-outlined text-sm text-text-dark">info</span>
</div>
<p class="font-display text-sm font-normal leading-normal text-text-medium">Once</p>
</div>
<div class="flex flex-col gap-1 border-t border-border-dark py-4">
<p class="font-display text-sm font-normal leading-normal text-text-dark">Created Date</p>
<p class="font-display text-sm font-normal leading-normal text-text-medium">Jan 22, 2024</p>
</div>
<div class="flex flex-col gap-1 border-t border-border-dark py-4">
<p class="font-display text-sm font-normal leading-normal text-text-dark">Applies To</p>
<p class="font-display text-sm font-normal leading-normal text-text-medium">All products</p>
</div>
<div class="flex flex-col gap-1 border-t border-border-dark py-4">
<p class="font-display text-sm font-normal leading-normal text-text-dark">Customer Limit</p>
<p class="font-display text-sm font-normal leading-normal text-text-medium">One per customer</p>
</div>
</div>
</main>
<!-- Panel Footer -->
<footer class="flex shrink-0 items-center justify-end gap-3 border-t border-border-dark px-6 py-4">
<button class="flex h-10 items-center justify-center rounded-lg bg-white/10 px-4 text-sm font-medium text-text-light transition-colors hover:bg-white/20">Deactivate Coupon</button>
<button class="flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-medium text-white transition-colors hover:bg-primary/90">Edit Coupon</button>
</footer>
</div>
</div>
</body></html>

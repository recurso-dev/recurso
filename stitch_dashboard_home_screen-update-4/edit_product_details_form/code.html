<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Product Details Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4F46E5",
              "background-light": "#f6f6f8",
              "background-dark": "#111827",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark antialiased">
<!-- Background Content (Simulated) -->
<div class="w-full h-full absolute inset-0 p-10 text-slate-400">
<div class="max-w-4xl mx-auto">
<h1 class="text-3xl font-bold text-slate-200">Products</h1>
<p class="mt-2">This is the main application content that the slide-over panel will appear on top of.</p>
</div>
</div>
<!-- Slide-over panel -->
<div class="fixed inset-0 bg-black/30 z-40"></div>
<div class="fixed right-0 top-0 h-full w-full max-w-lg bg-[#1F2937] shadow-2xl z-50 flex flex-col">
<!-- Panel Header -->
<div class="flex items-center justify-between border-b border-[#374151] p-6">
<h2 class="text-xl font-semibold text-white">Edit Product Details</h2>
<button class="text-gray-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Panel Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- Product Information Section -->
<div class="space-y-6">
<div class="flex flex-col min-w-40 flex-1">
<label class="text-sm font-medium leading-normal pb-2 text-gray-300" for="product-name">Product Name</label>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#4B5563] bg-[#111827] h-11 placeholder:text-gray-500 px-3 text-base font-normal leading-normal" id="product-name" value="Premium SaaS Plan"/>
</div>
</div>
<div class="flex flex-col min-w-40 flex-1">
<label class="text-sm font-medium leading-normal pb-2 text-gray-300" for="description">Description</label>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#4B5563] bg-[#111827] min-h-28 placeholder:text-gray-500 p-3 text-base font-normal leading-normal" id="description">Full access to all platform features, including advanced analytics and priority support.</textarea>
</div>
<div class="flex flex-col min-w-40 flex-1">
<label class="text-sm font-medium leading-normal pb-2 text-gray-300" for="sku">Identifier / SKU</label>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#4B5563] bg-[#111827] h-11 placeholder:text-gray-500 px-3 text-base font-normal leading-normal" id="sku" value="PROD_PREMIUM_2024"/>
</div>
</div>
<div>
<p class="text-sm font-medium leading-normal pb-2 text-gray-300">Status</p>
<div class="flex items-center justify-between rounded-lg border border-[#4B5563] bg-[#111827] p-3">
<span class="text-white">Active</span>
<button class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-primary transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#111827]">
<span class="inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-5"></span>
</button>
</div>
</div>
</div>
<!-- Divider -->
<div class="border-t border-[#374151]"></div>
<!-- Plan Management Section -->
<div class="space-y-4">
<h3 class="text-lg font-semibold text-white">Associated Plans</h3>
<p class="text-sm text-gray-400">Add or remove pricing plans associated with this product.</p>
<div class="relative">
<div class="flex w-full flex-1 items-center rounded-lg border border-[#4B5563] bg-[#111827] pr-3">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-white focus:outline-0 focus:ring-0 border-0 bg-transparent h-11 placeholder:text-gray-500 px-3 text-base font-normal leading-normal" placeholder="Search for plans..."/>
<span class="material-symbols-outlined text-gray-400">search</span>
</div>
<div class="mt-2 space-y-2">
<div class="flex items-center justify-between rounded-md bg-[#374151] p-3">
<span class="text-white text-sm font-medium">Monthly Plan</span>
<button class="text-gray-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-base">close</span>
</button>
</div>
<div class="flex items-center justify-between rounded-md bg-[#374151] p-3">
<span class="text-white text-sm font-medium">Annual Plan</span>
<button class="text-gray-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-base">close</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Panel Footer -->
<div class="flex justify-end gap-3 border-t border-[#374151] p-6 bg-[#1F2937]">
<button class="px-4 py-2 text-sm font-semibold text-white bg-[#374151] hover:bg-[#4B5563] rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-white/50">Cancel</button>
<button class="px-4 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary/90 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 focus:ring-offset-[#1F2937]">Save Changes</button>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recurso - Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#193ce6",
                        "primary-hover": "#142db8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111421",
                        "slate-900": "#0f172a",
                        "slate-700": "#334155",
                        "slate-500": "#64748b",
                        "slate-200": "#e2e8f0",
                        "slate-50": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                    boxShadow: {
                        'input-focus': '0 0 0 2px rgba(25, 60, 230, 0.2)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
            linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        .dark .bg-grid-pattern {
            background-image: linear-gradient(to right, #1e293b 1px, transparent 1px),
            linear-gradient(to bottom, #1e293b 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased selection:bg-primary/20 selection:text-primary">
<div class="relative min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 z-0 bg-grid-pattern opacity-[0.4] pointer-events-none"></div>
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="w-full max-w-[440px] px-6 z-10">
<!-- Brand Header -->
<div class="flex justify-center mb-10">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

</div>
<h1 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">Recurso</h1>
</div>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-card border border-slate-200 dark:border-slate-800 p-8 sm:p-10">
<div class="flex flex-col gap-2 mb-8 text-center">
<h2 class="text-slate-900 dark:text-white text-2xl font-bold tracking-tight">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your credentials to access your billing workspace.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Work Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-xs font-semibold uppercase tracking-wide" for="email">Work Email</label>
<input class="flex w-full h-11 px-3 py-2 bg-white dark:bg-slate-950 text-slate-900 dark:text-white rounded-lg border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 text-sm transition-all duration-200" id="email" placeholder="name@company.com" type="email" value=""/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-xs font-semibold uppercase tracking-wide" for="password">Password</label>
<a class="text-primary hover:text-primary-hover text-xs font-medium transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="flex w-full h-11 pl-3 pr-10 py-2 bg-white dark:bg-slate-950 text-slate-900 dark:text-white rounded-lg border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 text-sm transition-all duration-200" id="password" placeholder="••••••••" type="password" value=""/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full h-11 bg-primary hover:bg-primary-hover text-white text-sm font-semibold rounded-lg shadow-sm transition-all duration-200 flex items-center justify-center gap-2 group">
<span>Log in</span>
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:translate-x-0.5">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Don't have a workspace? 
                        <a class="text-primary hover:text-primary-hover font-medium ml-1 inline-flex items-center gap-0.5 group" href="#">
                            Register a new tenant
                            <span class="material-symbols-outlined text-[16px] transition-transform group-hover:translate-x-0.5">chevron_right</span>
</a>
</p>
</div>
</div>
<!-- Footer Compliance / Links -->
<div class="mt-8 flex justify-center gap-6 text-xs text-slate-400 dark:text-slate-500">
<a class="hover:text-slate-600 dark:hover:text-slate-300 transition-colors" href="#">Terms</a>
<a class="hover:text-slate-600 dark:hover:text-slate-300 transition-colors" href="#">Privacy</a>
<a class="hover:text-slate-600 dark:hover:text-slate-300 transition-colors" href="#">Status</a>
</div>
</div>
</div>

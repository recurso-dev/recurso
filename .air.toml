# Air config for `make dev` — rebuilds and restarts the API on file changes.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  include_ext = ["go", "yaml", "sql"]
  exclude_dir = ["tmp", "frontend", "docs", "docs-site", "postman", "k8s", ".git", "bin", ".claude"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[misc]
  clean_on_exit = true

[log]
  time = true

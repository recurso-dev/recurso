services:
  frontend:
    build:
      context: ./frontend
      args:
        # Leave empty so the SPA uses relative paths and nginx proxies to the API
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
    restart: always
    ports:
      - "80:8080"
    environment:
      - API_UPSTREAM=http://api:8080
    depends_on:
      - api
    networks:
      - recurso_net

  api:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - API_SECRET=${API_SECRET}
      - GIN_MODE=release
      - TIGERBEETLE_ADDRESS=tigerbeetle:3000
      - REDIS_URL=redis://redis:6379
      # Refuse to start on the no-op locker: schedulers must be serialized across
      # instances or money paths (mandate debit, trial conversion) risk running
      # twice (ENG-161).
      - REQUIRE_REDIS=true
    depends_on:
      - postgres
      - redis
    networks:
      - recurso_net

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - recurso_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Port 6379 is NOT exposed to host in production

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recurso_net
    # Port 5432 is NOT exposed to host in production for security

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    restart: always
    command: [ "start", "--addresses=0.0.0.0:3000", "/data/0_0.tigerbeetle" ]
    volumes:
      - tigerbeetle_data:/data
    networks:
      - recurso_net
    privileged: true
    init: true
    entrypoint: >
      /bin/sh -c " if [ ! -f /data/0_0.tigerbeetle ]; then
        ./tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle;
      fi; ./tigerbeetle start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle "
    # Port 3000/3001 NOT exposed to host

volumes:
  postgres_data:
  tigerbeetle_data:
  redis_data:


networks:
  recurso_net:
    driver: bridge

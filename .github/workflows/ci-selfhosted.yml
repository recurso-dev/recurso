name: CI (self-hosted)

# Runs the CI gates on the self-hosted runner (a local machine) instead of
# GitHub-hosted runners, so CI does not depend on Actions minutes/billing.
# scripts/local-ci.sh manages its own throwaway Postgres + Redis and runs the
# same gates as .github/workflows/ci.yml (build, vet, golangci-lint,
# go test -race, govulncheck).
on: [push, pull_request]

concurrency:
  group: ci-selfhosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-ci:
    name: Local CI
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: Run CI gates
        run: |
          # A launchd service starts with a minimal PATH; make the toolchain
          # (go, docker, golangci-lint, govulncheck) discoverable.
          export PATH="/usr/local/go/bin:/opt/homebrew/bin:$HOME/go/bin:$PATH"
          bash scripts/local-ci.sh

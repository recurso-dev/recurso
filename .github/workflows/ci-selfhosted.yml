name: CI (self-hosted)

# Runs the full CI on a self-hosted runner (a local machine) instead of
# GitHub-hosted runners, so CI does not depend on Actions minutes/billing.
# Mirrors .github/workflows/ci.yml (build/vet/lint/test/vuln, e2e, sdk). The
# single runner executes these jobs sequentially.
on: [push, pull_request]

concurrency:
  group: ci-selfhosted-${{ github.ref }}
  cancel-in-progress: true

env:
  # A launchd service starts with a minimal PATH; make the toolchain
  # (go, docker, node, python3, golangci-lint, govulncheck) discoverable.
  TOOLCHAIN_PATH: /usr/local/go/bin:/opt/homebrew/bin:/Users/swapnull/go/bin

jobs:
  local-ci:
    name: Local CI
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: Build / vet / lint / test -race / govulncheck
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          bash scripts/local-ci.sh

  e2e:
    name: E2E
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack + run e2e
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          # docker-compose.ci.yml drops host-port publishing for the internal
          # services so the stack doesn't collide with anything already bound on
          # the runner (e.g. a Homebrew postgres on 5432).
          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.ci.yml"
          # CI stack runs on 18080 (docker-compose.ci.yml) to coexist with a dev
          # stack on 8080.
          export API_URL="http://localhost:18080"
          $COMPOSE up -d --build
          for _ in $(seq 1 60); do
            curl -fsS "$API_URL/health" >/dev/null && break
            sleep 2
          done
          if ! curl -fsS "$API_URL/health" >/dev/null; then
            echo "API did not become healthy in time"; $COMPOSE logs api; exit 1
          fi
          chmod +x scripts/e2e_test.sh
          ./scripts/e2e_test.sh
      - name: Dump API logs on failure
        if: failure()
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs api || true
      - name: Tear down
        if: always()
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v || true

  sdk:
    name: SDK
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: Node SDK build & test
        working-directory: sdk/node
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          npm ci
          npm run build
          npm test
      - name: Python SDK smoke test
        run: |
          export PATH="${TOOLCHAIN_PATH}:$PATH"
          # Use a venv so Homebrew's externally-managed Python (PEP 668) doesn't reject the install.
          python3 -m venv /tmp/recurso-sdk-venv
          /tmp/recurso-sdk-venv/bin/pip install -q ./sdk/python
          /tmp/recurso-sdk-venv/bin/python sdk/python/tests/smoke_test.py
          rm -rf /tmp/recurso-sdk-venv

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recurso-api
  namespace: recurso
  labels:
    app: recurso
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.recurso.dev
      secretName: recurso-tls
  rules:
    - host: api.recurso.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recurso-api
                port:
                  number: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: recurso-api
  namespace: recurso
  labels:
    app: recurso
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recurso
      component: api
  template:
    metadata:
      labels:
        app: recurso
        component: api
    spec:
      serviceAccountName: recurso-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/recur-so/recurso:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Writable scratch space (Tally exports default to /tmp/tally-exports)
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: recurso-config
            - secretRef:
                name: recurso-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}

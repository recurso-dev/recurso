<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal - Recurso</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f5f7;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }

        .invoice-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .status-open {
            background: #fff3cd;
            color: #856404;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .btn {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Welcome, {{ .CustomerName }}</h2>

        <h3>Billing History</h3>
        {{ range .Invoices }}
        <div class="invoice-item">
            <div>
                <strong>{{ .InvoiceNumber }}</strong>
                <br>
                <small>Amount: {{ .Currency }} {{ .DisplayAmount }}</small>
            </div>
            <div>
                <span class="status status-{{ .Status }}">{{ .Status }}</span>
                {{ if eq .Status "open" }}
                <a href="/checkout/{{ .ID }}" class="btn">Pay Now</a>
                {{ end }}
            </div>
        </div>
        {{ else }}
        <p>No invoices found.</p>
        {{ end }}
    </div>
</body>

</html>

# CI override for the self-hosted e2e job. The runner machine may already have
# Postgres/Redis/etc bound on their default host ports (e.g. a Homebrew
# postgres on 5432), which makes `docker compose up` fail with "port already
# allocated". These services only need to talk to each other over the compose
# network, so drop their host-port publishing here. Only the API keeps its
# host port (8080), which the e2e test hits.
services:
  # Publish the API on a non-default host port so the CI stack coexists with a
  # dev stack that may already be on 8080. The e2e job hits localhost:18080.
  api:
    ports: !override ["18080:8080"]
  postgres:
    ports: !override []
  redis:
    ports: !override []
  dashboard:
    ports: !override []
  mailhog:
    ports: !override []
  tigerbeetle:
    ports: !override []

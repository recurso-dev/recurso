# Netlify build config for the Recurso marketing website (website/).
# The dashboard app (frontend/) and the Go API are deployed separately — this
# only builds the static SSG marketing site.
[build]
  base = "website"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# The site is statically generated (real HTML per route via vite-react-ssg),
# so direct URLs like /vs/lago resolve to their own index.html and need no SPA
# rewrite. A trailing catch-all is intentionally omitted to preserve per-page SEO.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

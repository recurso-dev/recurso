<div class="relative">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">

<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#323267] bg-[#191933] h-12 placeholder:text-[#9292c9] pl-12 pr-3 py-2 text-base font-normal leading-normal" placeholder="0.00" type="number"/>
</div>
</label>

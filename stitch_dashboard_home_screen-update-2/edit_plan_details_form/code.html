<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Plan Details Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#6366F1",
            "background-light": "#f6f6f8",
            "background-dark": "#111827",
            "panel-dark": "#1F2937",
            "border-dark": "#374151",
            "text-dark-primary": "#D1D5DB",
            "text-dark-secondary": "#9CA3AF",
            "input-dark": "#374151"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.375rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-hidden">
<!-- This div simulates the main app content area -->
<div class="absolute inset-0 bg-background-light dark:bg-background-dark blur-sm">
<p class="p-8 text-transparent">Main application content in the background.</p>
</div>
<!-- Slide-Over Panel -->
<div class="fixed inset-y-0 right-0 flex w-full max-w-2xl flex-col border-l border-transparent dark:border-border-dark bg-background-light dark:bg-panel-dark shadow-2xl">
<div class="flex h-full grow flex-col">
<!-- Panel Header -->
<div class="flex items-center justify-between gap-3 p-6 border-b border-gray-200 dark:border-border-dark">
<p class="text-slate-900 dark:text-text-dark-primary text-xl font-bold leading-tight">Edit Plan Details</p>
<button class="flex h-8 w-8 cursor-pointer items-center justify-center overflow-hidden rounded-lg bg-transparent text-slate-600 dark:text-text-dark-secondary hover:bg-slate-100 dark:hover:bg-slate-700/50">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Panel Body with Form Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- General Section -->
<div>
<h3 class="text-slate-900 dark:text-text-dark-primary text-lg font-bold leading-tight tracking-[-0.015em] pb-4">General</h3>
<div class="space-y-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Plan Name</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 placeholder:text-slate-400 dark:placeholder:text-text-dark-secondary p-3 text-sm font-normal leading-normal" value="Pro Tier"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Plan ID</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-500 dark:text-text-dark-secondary focus:outline-0 border-gray-300 dark:border-border-dark bg-slate-50 dark:bg-slate-800/50 h-11 p-3 text-sm font-normal leading-normal" readonly="" value="plan_pro_monthly_v2"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Description</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark min-h-24 placeholder:text-slate-400 dark:placeholder:text-text-dark-secondary p-3 text-sm font-normal leading-normal">Full access to all Pro features and unlimited API calls.</textarea>
</label>
</div>
</div>
<!-- Pricing Section -->
<div>
<h3 class="text-slate-900 dark:text-text-dark-primary text-lg font-bold leading-tight tracking-[-0.015em] pb-4">Pricing</h3>
<div class="grid grid-cols-2 gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Price</p>
<div class="relative flex w-full items-center">
<span class="absolute left-3 text-slate-500 dark:text-text-dark-secondary text-sm">$</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 pl-7 pr-3 text-sm" type="number" value="49.99"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Billing Interval</p>
<div class="relative flex items-center w-full">
<select class="form-select w-full appearance-none rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 px-3 text-sm">
<option>Yearly</option>
<option selected="">Monthly</option>
<option>Quarterly</option>
</select>
<span class="material-symbols-outlined absolute right-3 text-slate-500 dark:text-text-dark-secondary pointer-events-none">expand_more</span>
</div>
</label>
</div>
</div>
<!-- Usage-Based Billing Section -->
<div>
<h3 class="text-slate-900 dark:text-text-dark-primary text-lg font-bold leading-tight tracking-[-0.015em] pb-4">Usage-Based Billing</h3>
<div class="space-y-6">
<div class="flex items-center justify-between rounded-lg p-4 bg-slate-100 dark:bg-slate-800/50">
<p class="text-slate-800 dark:text-text-dark-primary text-sm font-medium">Enable Usage-Based Billing</p>
<label class="relative inline-flex cursor-pointer items-center">
<input checked="" class="peer sr-only" type="checkbox" value=""/>
<div class="peer h-6 w-11 rounded-full bg-slate-300 dark:bg-slate-600 after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:translate-x-full peer-checked:after:border-white peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary/30"></div>
</label>
</div>
<div class="space-y-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pb-2">Metric Name</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 placeholder:text-slate-400 dark:placeholder:text-text-dark-secondary p-3 text-sm font-normal leading-normal" placeholder="e.g., Seats, API Calls, GB Storage" value="API Calls"/>
</div>
</label>
<!-- Usage Tiers -->
<p class="text-slate-700 dark:text-text-dark-secondary text-sm font-medium leading-normal pt-2">Usage Tiers</p>
<div class="space-y-3">
<!-- Tier 1 -->
<div class="flex items-center gap-3">
<span class="text-slate-500 dark:text-text-dark-secondary text-sm w-20">Up to</span>
<input class="form-input w-28 rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 px-3 text-sm" type="text" value="1,000"/>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm">units</span>
<div class="relative flex items-center flex-1">
<span class="absolute left-3 text-slate-500 dark:text-text-dark-secondary text-sm">$</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 pl-7 pr-3 text-sm" type="number" value="0.05"/>
</div>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm mr-auto">per unit</span>
<button class="flex h-9 w-9 items-center justify-center rounded-lg text-slate-500 dark:text-text-dark-secondary hover:bg-slate-100 dark:hover:bg-slate-700/50">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Tier 2 -->
<div class="flex items-center gap-3">
<span class="text-slate-500 dark:text-text-dark-secondary text-sm w-20">Next</span>
<input class="form-input w-28 rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 px-3 text-sm" type="text" value="9,000"/>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm">units</span>
<div class="relative flex items-center flex-1">
<span class="absolute left-3 text-slate-500 dark:text-text-dark-secondary text-sm">$</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 pl-7 pr-3 text-sm" type="number" value="0.03"/>
</div>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm mr-auto">per unit</span>
<button class="flex h-9 w-9 items-center justify-center rounded-lg text-slate-500 dark:text-text-dark-secondary hover:bg-slate-100 dark:hover:bg-slate-700/50">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Tier 3 -->
<div class="flex items-center gap-3">
<span class="text-slate-500 dark:text-text-dark-secondary text-sm w-20">Over 10,000</span>
<div class="w-28"></div>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm">units</span>
<div class="relative flex items-center flex-1">
<span class="absolute left-3 text-slate-500 dark:text-text-dark-secondary text-sm">$</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border-gray-300 dark:border-border-dark bg-white dark:bg-input-dark h-11 pl-7 pr-3 text-sm" type="number" value="0.01"/>
</div>
<span class="text-slate-500 dark:text-text-dark-secondary text-sm mr-auto">per unit</span>
<button class="flex h-9 w-9 items-center justify-center rounded-lg text-slate-500 dark:text-text-dark-secondary hover:bg-slate-100 dark:hover:bg-slate-700/50">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
<button class="flex items-center gap-2 text-sm font-medium text-primary hover:text-primary/80 mt-3">
<span class="material-symbols-outlined text-xl">add_circle</span>
                        Add Tier
                    </button>
</div>
</div>
</div>
</div>
<!-- Panel Footer with Actions -->
<div class="flex flex-wrap justify-end gap-3 p-6 border-t border-gray-200 dark:border-border-dark">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-text-dark-primary text-sm font-medium leading-normal hover:bg-slate-300 dark:hover:bg-slate-600">
<span class="truncate">Cancel</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-medium leading-normal hover:bg-primary/90">
<span class="truncate">Save Changes</span>
</button>
</div>
</div>
</div>
</div>
</body></html>

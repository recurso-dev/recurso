<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Generate New API Key Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4F46E5", // Indigo/Violet
              "background-light": "#f6f6f8",
              "background-dark": "#111827", // Dark Slate Gray
              "text-light": "#D1D5DB", // Light Gray/Off-White for dark mode text
              "border-dark": "#374151" // Darker, subtle Gray for dark mode borders
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Background Overlay -->
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
<!-- Slide-over Panel -->
<div class="relative flex h-full w-full max-w-2xl flex-col rounded-xl bg-white dark:bg-slate-900 shadow-2xl ring-1 ring-black/10 dark:ring-white/10">
<!-- Panel Header -->
<div class="flex items-center justify-between border-b border-slate-200 dark:border-border-dark px-6 py-4">
<p class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Create a new API key</p>
<button class="flex items-center justify-center rounded-lg p-1 text-slate-500 dark:text-text-light hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
<span class="material-symbols-outlined" style="font-size: 24px;">close</span>
</button>
</div>
<!-- Panel Content -->
<div class="flex-1 overflow-y-auto p-6 sm:p-8 space-y-8">
<!-- Name Section -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-text-light" for="key-name">Name</label>
<input class="form-input block w-full rounded-lg border-slate-300 dark:border-border-dark bg-white dark:bg-slate-800 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-11" id="key-name" placeholder="e.g., Marketing API Key" type="text"/>
<p class="text-sm text-slate-500 dark:text-slate-400">Give this key a descriptive name for your reference.</p>
</div>
<!-- Permissions Section -->
<div class="space-y-4">
<div class="space-y-1">
<h3 class="text-slate-900 dark:text-white text-base font-bold leading-tight">Permissions</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Select the permissions this API key will have.</p>
</div>
<!-- Permission Group -->
<div class="space-y-4 rounded-xl border border-slate-200 dark:border-border-dark p-4">
<h4 class="font-semibold text-slate-800 dark:text-slate-200">Invoices</h4>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
<label class="flex items-center gap-3 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Read invoices</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Write invoices</span>
</label>
</div>
</div>
<!-- Permission Group -->
<div class="space-y-4 rounded-xl border border-slate-200 dark:border-border-dark p-4">
<h4 class="font-semibold text-slate-800 dark:text-slate-200">Subscriptions</h4>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
<label class="flex items-center gap-3 cursor-pointer">
<input checked="" class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Read subscriptions</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Write subscriptions</span>
</label>
</div>
</div>
<!-- Permission Group -->
<div class="space-y-4 rounded-xl border border-slate-200 dark:border-border-dark p-4">
<h4 class="font-semibold text-slate-800 dark:text-slate-200">Customers</h4>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
<label class="flex items-center gap-3 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Read customers</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-white dark:focus:ring-offset-slate-900" type="checkbox"/>
<span class="text-sm text-slate-700 dark:text-text-light">Write customers</span>
</label>
</div>
</div>
</div>

</div>
<!-- Panel Footer -->
<div class="flex flex-shrink-0 justify-end gap-3 border-t border-slate-200 dark:border-border-dark px-6 py-4">
<button class="rounded-lg px-4 py-2.5 text-sm font-semibold text-slate-700 dark:text-text-light hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">Cancel</button>
<button class="rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:opacity-50" disabled="">Create Key</button>
<!-- Final "Done" Button (Hidden by default) -->
<!-- <button class="rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">Done</button> -->
</div>
</div>
</div>
</body></html>

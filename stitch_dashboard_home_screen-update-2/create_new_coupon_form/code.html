<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Coupon Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#4f46e5",
            "background-light": "#f3f4f6",
            "background-dark": "#111827",
            "slate-100": "#f1f5f9",
            "slate-200": "#e2e8f0",
            "slate-300": "#cbd5e1",
            "slate-400": "#94a3b8",
            "slate-500": "#64748b",
            "slate-600": "#475569",
            "slate-700": "#334155",
            "slate-800": "#1e293b",
            "slate-900": "#0f172a",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.375rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div aria-hidden="true" class="fixed inset-0 bg-slate-900/60 dark:bg-slate-900/80"></div>
<div class="absolute inset-y-0 right-0 flex w-full max-w-2xl">
<div class="flex h-full w-full flex-col bg-white dark:bg-slate-900 shadow-2xl">
<div class="flex flex-col h-full">
<header class="flex h-16 flex-shrink-0 items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6">
<h1 class="text-lg font-medium text-slate-900 dark:text-slate-100">Create New Coupon</h1>
<button class="flex items-center justify-center rounded-lg p-1 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200 focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</header>
<main class="flex-1 overflow-y-auto p-8">
<div class="space-y-8">
<div class="grid grid-cols-1 gap-6">
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Coupon Code</p>
<div class="relative flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-primary h-11 px-3 text-sm" placeholder="e.g. SUMMER25OFF" value=""/>
<button class="inline-flex items-center gap-2 whitespace-nowrap border border-l-0 border-slate-300 bg-slate-50 dark:border-slate-700 dark:bg-slate-800 px-4 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">
<span class="material-symbols-outlined text-base">auto_awesome</span>
                      Generate
                    </button>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-2">Customers will enter this code at checkout.</p>
</label>
</div>
<div class="grid grid-cols-2 gap-6">
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Discount Type</p>
<select class="form-select flex w-full min-w-0 flex-1 overflow-hidden rounded-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 px-3 text-sm">
<option>Percent Off</option>
<option>Amount Off</option>
</select>
</label>
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Discount Value</p>
<div class="relative rounded-lg">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
<span class="text-slate-500 dark:text-slate-400 sm:text-sm">%</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-primary h-11 pl-7 pr-3 text-sm" placeholder="25" value=""/>
</div>
</label>
</div>
<div class="grid grid-cols-2 gap-6">
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Duration</p>
<select class="form-select flex w-full min-w-0 flex-1 overflow-hidden rounded-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 px-3 text-sm">
<option>Forever</option>
<option>Once</option>
<option selected="">Limited Time</option>
</select>
</label>
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Duration in Months</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-primary h-11 px-3 text-sm" placeholder="e.g. 12" value=""/>
</label>
</div>
<div class="grid grid-cols-1 gap-6">
<label class="flex flex-col">
<p class="text-sm font-medium leading-6 text-slate-900 dark:text-slate-200 pb-2">Max Redemptions (optional)</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-primary h-11 px-3 text-sm" placeholder="Enter max redemptions" value=""/>
</label>
</div>
<div class="flex items-center justify-between">
<div class="flex flex-col">
<p class="text-sm font-medium text-slate-900 dark:text-slate-200">Status</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Set the coupon as active or inactive.</p>
</div>
<button aria-checked="true" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900 transition-colors duration-200 ease-in-out" role="switch" type="button">
<span aria-hidden="true" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-5"></span>
</button>
</div>
</div>
</main>
<footer class="flex flex-shrink-0 items-center justify-end gap-3 border-t border-slate-200 dark:border-slate-800 px-6 py-4">
<button class="inline-flex items-center justify-center rounded-lg bg-white dark:bg-slate-800 px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">Cancel</button>
<button class="inline-flex items-center justify-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">Create Coupon</button>
</footer>
</div>
</div>
</div>
</div>
</body></html>
